<div style="font-family: Arial, sans-serif;">
  <header style="background-color: black; color: white; padding: 40px; text-align: center; position: relative;">
    <!-- Location on the top-right corner -->
    <div style="position: absolute; top: 10px; right: 20px; font-size: 0.9rem; text-align: right;">
      <p style="margin: 0;">📌 New York, NY</p>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center;">
      <img
        src="https://avatars.githubusercontent.com/u/73338689?s=400&u=64ff6a0a645d9b7d720739be1e7108eb6d053813&v=4"
        alt="Profile Picture"
        style="width: 175px; height: 175px; border-radius: 50%; border: 2.5px solid red;"
      />
      <h2 style="margin-bottom: 5px;">Shresth Kapoor</h2>
      <p style="margin-top: 2.5px;">MS in Computer Science at NYU Tandon School of Engineering</p>
    </div>
  </header>

  <nav style="display: flex; justify-content: center; background-color: #04D1B7; padding: 10px;">
    <button (click)="currentTab = 'projects'" [style.color]="currentTab === 'projects' ? 'red' : 'black'" class="nav-button">Projects</button>
    <button (click)="currentTab = 'socials'" [style.color]="currentTab === 'socials' ? 'red' : 'black'" class="nav-button">Socials</button>
    <button (click)="currentTab = 'articles'" [style.color]="currentTab === 'articles' ? 'red' : 'black'" class="nav-button">Articles</button>
  </nav>

  <main style="padding: 20px; background: linear-gradient(to bottom right, black, #04D1B7); text-align: center;">
    <!-- Projects Section -->
    <section *ngIf="currentTab === 'projects'">
      <div class="content-container">
        <div *ngFor="let project of projects" class="card" (click)="openLink(project.link)">
          <img [src]="project.image" alt="{{ project.title }} image" class="card-image" />
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
        </div>
      </div>
    </section>

    <!-- Socials Section -->
    <section *ngIf="currentTab === 'socials'">
      <div class="content-container">
        <div *ngFor="let social of socials" class="card" (click)="openLink(social.link)">
          <img [src]="social.icon || 'assets/default-social-icon.jpg'" alt="{{ social.name }} icon" class="card-image" />
          <h3>{{ social.name }}</h3>
          <p>{{ social.bio }}</p>
          <button *ngIf="social.showFollow" (click)="openLink(social.followClick)" class="follow-button">
            {{ social.follow }}
          </button>
        </div>
      </div>
    </section>

    <!-- Articles Section -->
    <section *ngIf="currentTab === 'articles'">
      <div class="content-container">
        <div *ngFor="let article of articles" class="card">
          <h3>{{ article.title }}</h3>
          <p>{{ article.description }}</p>
          <a [href]="article.link" target="_blank" class="link">Read More</a>
        </div>
      </div>
    </section>
  </main>

  <footer style="margin-top: 20px; color: grey; text-align: center;">
    <h4>© {{ year }} Shresth Kapoor</h4>
  </footer>
</div>
