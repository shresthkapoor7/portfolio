<div style="text-align: center; font-family: Arial, sans-serif; padding: 20px;">
  <header style="background-color: #007BFF; color: white; padding: 10px;">
    <h1>Shresth Kapoor</h1>
    <p>Welcome to my portfolio</p>
  </header>

  <section>
    <h2 style="color: #007BFF;">Projects</h2>
    <div *ngFor="let project of projects" style="margin: 10px; padding: 10px; border: 1px solid #ddd;">
      <h3>{{ project.title }}</h3>
      <p>{{ project.description }}</p>
      <a [href]="project.link" target="_blank">View Project</a>
    </div>
  </section>

  <footer style="margin-top: 20px; color: gray;">
    <p>© {{ year }} Shresth Kapoor</p>
  </footer>
</div>
